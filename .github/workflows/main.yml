name: Deploy – Frontend (Next.js)

on:
  push:
    branches:
      - main
      - staging

# Prevent concurrent deployments for the same branch
concurrency:
  group: deploy-frontend-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # ── Lint & type-check before deploying ──────────────────────────────────────
  lint:
    name: Lint & Type-Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint

  # ── Deploy to production / staging ─────────────────────────────────────────
  deploy:
    name: Deploy to ${{ github.ref_name == 'main' && 'Production' || 'Staging' }}
    runs-on: ubuntu-latest
    needs: lint
    permissions: {}
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            if [ "${{ github.ref_name }}" = "main" ]; then
              APP_DIR="${{ secrets.APP_DIR }}"
              BRANCH="main"
              PM2_APP="polymer-frontend"
            elif [ "${{ github.ref_name }}" = "staging" ]; then
              APP_DIR="${{ secrets.STAGING_APP_DIR }}"
              BRANCH="staging"
              PM2_APP="polymer-frontend-staging"
            else
              echo "❌ Unsupported branch: ${{ github.ref_name }}"
              exit 1
            fi

            cd "$APP_DIR"

            echo "──────────────────────────────────────────────"
            echo "🔄  Pulling latest code from origin/$BRANCH"
            echo "──────────────────────────────────────────────"
            git fetch origin
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            echo "📦  Installing dependencies"
            pnpm install --frozen-lockfile

            echo "🏗️   Building Next.js"
            rm -rf .next
            pnpm run build

            echo "♻️   Reloading PM2 process: $PM2_APP"
            if pm2 describe "$PM2_APP" > /dev/null 2>&1; then
              pm2 reload "$PM2_APP" --update-env
            else
              pm2 start /var/www/polymer/deployment/pm2/ecosystem.config.js \
                  --only "$PM2_APP" --env production
            fi
            pm2 save

            echo "──────────────────────────────────────────────"
            echo "✅  Frontend deployment complete!"
            echo "──────────────────────────────────────────────"

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # Simple HTTP health-check
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 http://127.0.0.1:3000 || echo "000")
            if [[ "$HTTP_CODE" =~ ^[23] ]]; then
              echo "✅  Health check passed (HTTP $HTTP_CODE)"
            else
              echo "❌  Health check FAILED (HTTP $HTTP_CODE)"
              exit 1
            fi
