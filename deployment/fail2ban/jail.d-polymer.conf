# ─── Fail2Ban: Jail configuration ────────────────────────────────────────────
# File: /etc/fail2ban/jail.d/polymer.conf
#
# Overrides defaults in /etc/fail2ban/jail.conf.
# After placing this file run:
#   sudo systemctl reload fail2ban
#   sudo fail2ban-client status

[DEFAULT]
# Ban duration: 1 hour
bantime  = 3600
# Window within which failures are counted
findtime = 600
# Number of failures before a ban
maxretry = 5
# Ignore your own monitoring IPs (comma-separated)
ignoreip = 127.0.0.1/8 ::1

# ── SSH brute-force protection ────────────────────────────────────────────────
[sshd]
enabled  = true
port     = ssh
filter   = sshd
logpath  = /var/log/auth.log
maxretry = 3
bantime  = 86400   ; 24 hours for SSH attacks

# ── Nginx HTTP auth ───────────────────────────────────────────────────────────
[nginx-http-auth]
enabled  = true
port     = http,https
filter   = nginx-http-auth
logpath  = /var/log/nginx/*error.log
maxretry = 3

# ── Nginx rate limit ──────────────────────────────────────────────────────────
[nginx-req-limit]
enabled  = true
port     = http,https
filter   = nginx-req-limit
logpath  = /var/log/nginx/*error.log
maxretry = 10

# ── Nginx bot/exploit scanning ────────────────────────────────────────────────
[nginx-botsearch]
enabled  = true
port     = http,https
filter   = nginx-botsearch
logpath  = /var/log/nginx/*access.log
maxretry = 2
bantime  = 86400
