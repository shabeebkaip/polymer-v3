# ─── Fail2Ban: Nginx botsearch filter ────────────────────────────────────────
# File: /etc/fail2ban/filter.d/nginx-botsearch.conf
# Blocks clients that probe common exploit paths.

[Definition]
failregex = ^<HOST> -.*"(GET|POST).*/(\.|wp-admin|wp-login|phpMyAdmin|phpmyadmin|admin|administrator|xmlrpc\.php|\.env|\.git/|shell\.php|etc/passwd).*" (40[0-9]|50[0-9]) .*$
ignoreregex =
