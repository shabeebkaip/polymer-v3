# ─── Nginx: Admin Dashboard (Vite / Vue) ─────────────────────────────────────
# Domain:  admin.example.com
# Upstream: localhost:5173
#
# Place this file in /etc/nginx/sites-available/admin.example.com
# then: sudo ln -s /etc/nginx/sites-available/admin.example.com /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx

# Redirect plain HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name admin.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS – Admin Dashboard
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.example.com;

    # ── SSL certificates (managed by Certbot) ──────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/admin.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.example.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ───────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "SAMEORIGIN"                                  always;
    add_header X-Content-Type-Options     "nosniff"                                     always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"             always;

    # ── IP allowlist (uncomment and customise for admin-only access) ───────
    # allow 203.0.113.0/24;   # your office CIDR
    # deny  all;

    # ── Logging ────────────────────────────────────────────────────────────
    access_log /var/log/nginx/admin.example.com-access.log;
    error_log  /var/log/nginx/admin.example.com-error.log  warn;

    # ── Gzip compression ───────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types      text/plain text/css application/json
                    application/javascript image/svg+xml;

    # ── Proxy to Vite preview ──────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}
