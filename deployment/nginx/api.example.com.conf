# ─── Nginx: Backend API (Node.js / Express) ──────────────────────────────────
# Domain:  api.example.com
# Upstream: localhost:5000
#
# Place this file in /etc/nginx/sites-available/api.example.com
# then: sudo ln -s /etc/nginx/sites-available/api.example.com /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx

# Redirect plain HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS – API
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.example.com;

    # ── SSL certificates (managed by Certbot) ──────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.example.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ───────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "DENY"                                         always;
    add_header X-Content-Type-Options     "nosniff"                                      always;
    add_header Referrer-Policy            "no-referrer"                                  always;

    # ── Logging ────────────────────────────────────────────────────────────
    access_log /var/log/nginx/api.example.com-access.log;
    error_log  /var/log/nginx/api.example.com-error.log  warn;

    # ── Request body size limit ────────────────────────────────────────────
    client_max_body_size 10M;

    # ── Rate limiting (define zones in nginx.conf http block) ──────────────
    # limit_req zone=api burst=20 nodelay;

    # ── Gzip compression ───────────────────────────────────────────────────
    gzip            on;
    gzip_types      application/json text/plain;
    gzip_comp_level 6;

    # ── Proxy to Express ───────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
    }

    # ── WebSocket for Socket.IO ────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }
}
