# ─── Nginx: Frontend (Next.js) ───────────────────────────────────────────────
# Domain:  example.com (and www.example.com)
# Upstream: localhost:3000
#
# Place this file in /etc/nginx/sites-available/example.com
# then: sudo ln -s /etc/nginx/sites-available/example.com /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx

# Redirect plain HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS – main frontend
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com www.example.com;

    # ── SSL certificates (managed by Certbot) ──────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ───────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "SAMEORIGIN"                                  always;
    add_header X-Content-Type-Options     "nosniff"                                     always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"             always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"    always;
    # NOTE: 'unsafe-inline' and 'unsafe-eval' are required by Next.js's built-in
    # script inlining. Replace with nonce-based CSP once next/headers nonce support
    # is enabled in your Next.js config for stronger XSS protection.
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://res.cloudinary.com https://media.knowde.com; font-src 'self' data:; connect-src 'self' https://api.example.com; frame-ancestors 'none';" always;

    # ── Logging ────────────────────────────────────────────────────────────
    access_log /var/log/nginx/example.com-access.log;
    error_log  /var/log/nginx/example.com-error.log  warn;

    # ── Gzip compression ───────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types      text/plain text/css text/xml application/json
                    application/javascript application/rss+xml
                    application/atom+xml image/svg+xml;

    # ── Static assets: long cache, served directly ─────────────────────────
    location /_next/static/ {
        alias /var/www/polymer/frontend/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /static/ {
        alias /var/www/polymer/frontend/public/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Proxy to Next.js ───────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # ── WebSocket support (Next.js HMR / Socket.IO) ───────────────────────
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }
}
