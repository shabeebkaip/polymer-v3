# ─── Nginx global rate-limit zones ───────────────────────────────────────────
# Add the following block inside the `http { }` section of /etc/nginx/nginx.conf
# (or drop this file as /etc/nginx/conf.d/rate-limit.conf)

# General API zone: 30 requests/second per IP, 10 MB state storage
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

# Login / auth zone: tighter limit to slow brute-force
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# Default burst settings (reference these from individual server blocks):
#   limit_req zone=api   burst=20  nodelay;
#   limit_req zone=login burst=5   nodelay;

# Return 429 Too Many Requests instead of the default 503
limit_req_status 429;
